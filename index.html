<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Happy Birthday Thanh Tuyền</title>
<style>
body{margin:0;font-family:Arial,sans-serif;overflow:hidden;background:radial-gradient(circle,#ffb6d5,#8b5cf6);color:#fff}
#bg{position:fixed;inset:0}
.main{position:relative;z-index:2;height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:20px;text-align:center}
h1{font-size:clamp(2.8rem,8vw,5rem);margin:.2em}.name{color:#ffe66d}.card{max-width:800px;background:rgba(255,255,255,.15);backdrop-filter:blur(10px);padding:24px;border-radius:24px}
.type{font-size:1.3rem;min-height:120px;line-height:1.7}
button{padding:14px 30px;border:0;border-radius:30px;font-size:1.1rem}
</style></head><body>
<canvas id="bg"></canvas>
<div class="main"><div class="card"><div style="font-size:70px">🎂✨</div><h1>Happy Birthday</h1><h1 class="name">Thanh Tuyền 💖</h1><p>Chúc mừng tuổi 18 – một hành trình mới đầy hy vọng!</p><div class="type" id="t"></div><button onclick="location.reload()">Phát lại 🎉</button></div></div>
<script>
const msg=`Chúc Thanh Tuyền luôn mạnh khỏe, hạnh phúc và đạt được mọi điều mình mong muốn.
Mong rằng tuổi 18 sẽ mang đến thật nhiều cơ hội, những người bạn tốt và thật nhiều kỷ niệm đẹp.
Hãy luôn giữ nụ cười rạng rỡ, tự tin theo đuổi ước mơ và tận hưởng từng khoảnh khắc của tuổi trẻ.
Chúc sinh nhật thật vui và đáng nhớ! 💕`;
let i=0,e=document.getElementById('t');(function w(){if(i<msg.length){e.textContent+=msg[i++];setTimeout(w,35)}})();
const c=document.getElementById('bg'),x=c.getContext('2d');function rs(){c.width=innerWidth;c.height=innerHeight}rs();onresize=rs;
let p=[...Array(180)].map(()=>({x:Math.random()*c.width,y:Math.random()*c.height,r:2+Math.random()*5,v:1+Math.random()*3,a:Math.random()*6.28,s:(Math.random()-.5)*.1}));
(function f(){x.clearRect(0,0,c.width,c.height);for(let o of p){o.y+=o.v;o.a+=o.s;if(o.y>c.height){o.y=-10;o.x=Math.random()*c.width}x.save();x.translate(o.x,o.y);x.rotate(o.a);x.fillStyle=["#ff4d6d","#ffd93d","#6bcB77","#4d96ff"][Math.random()*4|0];x.fillRect(-o.r,-o.r,o.r*2,o.r*2);x.restore()}requestAnimationFrame(f)})();
</script></body></html>
